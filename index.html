<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fern Tracker" />
  <title>Fern Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #FAF7F2; }
    body { font-family: 'Jost', 'Helvetica Neue', sans-serif; -webkit-tap-highlight-color: transparent; }
    input, textarea, button, select { font-family: inherit; }
    input:focus, textarea:focus { border-color: #5C7A5C !important; outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ─── Config ────────────────────────────────────────────────────────────────
    const API = "https://script.google.com/macros/s/AKfycbyGclw9QxeqH1BugOuTyxzA7w_XUHRbMIgxK5CVu7j05jmXjEwhDpWPFUiXsZKizpm-/exec";

    async function api(params) {
      const url = API + "?" + new URLSearchParams(params).toString();
      const res = await fetch(url);
      return res.json();
    }

    // ─── Local session storage ─────────────────────────────────────────────────
    function getSession() {
      try { return JSON.parse(localStorage.getItem("ferntracker-session") || "null"); } catch { return null; }
    }
    function setSession(s) {
      try { localStorage.setItem("ferntracker-session", JSON.stringify(s)); } catch {}
    }
    function clearSession() {
      try { localStorage.removeItem("ferntracker-session"); } catch {}
    }

    // ─── Design tokens ─────────────────────────────────────────────────────────
    const C = {
      cream:      "#FAF7F2",
      green:      "#5C7A5C",
      greenLight: "#EBF0EB",
      brown:      "#4A3728",
      brownLight: "#F2EDE6",
      brownMid:   "#C4A882",
      border:     "#E2DDD6",
      textDark:   "#2C2219",
      textMid:    "#7A6A5A",
      textLight:  "#A89880",
      white:      "#FFFFFF",
      error:      "#8C3030",
    };
    const SERIF = "'Cormorant Garamond', Georgia, serif";
    const SANS  = "'Jost', 'Helvetica Neue', sans-serif";

    // ─── Constants ─────────────────────────────────────────────────────────────
    const GENDER_OPTIONS = ["Unknown", "Girl", "Boy", "Surprise"];
    const GENDER_STYLES = {
      Girl:     { bg: "#F9EEF2", accent: "#9C4B6E", emoji: "🎀" },
      Boy:      { bg: "#EEF2F9", accent: "#4B6E9C", emoji: "🩵" },
      Surprise: { bg: "#F2EEF9", accent: "#6E4B9C", emoji: "🎁" },
      Unknown:  { bg: C.brownLight, accent: C.textMid, emoji: "✨" },
    };
    const TRIMESTER_COLORS  = ["#F9EEF2", C.brownLight, C.greenLight];
    const TRIMESTER_ACCENTS = ["#9C4B6E", C.brownMid, C.green];

    // ─── Helpers ───────────────────────────────────────────────────────────────
    function getTrimester(w) { return w <= 13 ? 1 : w <= 26 ? 2 : 3; }
    function getWeeksFromDueDate(d) {
      const days = 280 - Math.round((new Date(d) - new Date()) / 86400000);
      return Math.max(0, Math.min(42, Math.round(days / 7)));
    }
    function getDueDateFromWeeks(w) {
      const d = new Date(); d.setDate(d.getDate() + (40 - w) * 7);
      return d.toISOString().split("T")[0];
    }
    function getAge(birthDate) {
      const birth = new Date(birthDate + "T12:00:00"), now = new Date();
      let years = now.getFullYear() - birth.getFullYear();
      let months = now.getMonth() - birth.getMonth();
      const days2 = now.getDate() - birth.getDate();
      if (days2 < 0) months--;
      if (months < 0) { years--; months += 12; }
      return { years, months, totalMonths: years * 12 + months, days: Math.floor((now - birth) / 86400000) };
    }
    function formatAge({ years, months, totalMonths, days }) {
      if (days < 14)        return `${days}d old`;
      if (days < 60)        return `${Math.floor(days / 7)}w old`;
      if (totalMonths < 24) return `${totalMonths}mo old`;
      if (months === 0)     return `${years}yr old`;
      return `${years}yr ${months}mo old`;
    }
    function getAgeStage(m) {
      if (m <  3) return { label: "Newborn", color: "#9C4B6E", bg: "#F9EEF2" };
      if (m < 12) return { label: "Infant",  color: "#7A6020", bg: "#FBF3E0" };
      if (m < 36) return { label: "Toddler", color: C.green,   bg: C.greenLight };
      if (m < 72) return { label: "Pre-K",   color: "#4B6E9C", bg: "#EEF2F9" };
      return             { label: "Kid",     color: C.brown,   bg: C.brownLight };
    }
    function fmtDate(s) {
      return new Date(s + "T12:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
    }

    // ─── Shared UI ─────────────────────────────────────────────────────────────
    function Chip({ label, bg, color }) {
      return (
        <span style={{ background: bg, color, fontSize: "11px", fontWeight: 500,
          padding: "3px 9px", borderRadius: "3px", letterSpacing: "0.04em",
          whiteSpace: "nowrap", fontFamily: SANS }}>{label}</span>
      );
    }
    function Btn(bg, color, extra = {}) {
      return { background: bg, color, border: "none", borderRadius: "3px",
        padding: "8px 16px", fontSize: "13px", fontWeight: 500, letterSpacing: "0.06em",
        cursor: "pointer", fontFamily: SANS, textTransform: "uppercase", ...extra };
    }
    function MiniRing({ pct, color, label }) {
      const r = 20, circ = 2 * Math.PI * r, dash = Math.min(pct, 1) * circ;
      return (
        <svg width="50" height="50" style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>
          <circle cx="25" cy="25" r={r} fill="none" stroke={C.border} strokeWidth="3.5" />
          <circle cx="25" cy="25" r={r} fill="none" stroke={color} strokeWidth="3.5"
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            style={{ transition: "stroke-dasharray 0.5s ease" }} />
          <text x="25" y="25" textAnchor="middle" dominantBaseline="central"
            style={{ transform: "rotate(90deg)", transformOrigin: "25px 25px",
              fontSize: "9px", fontWeight: 600, fill: C.textDark, fontFamily: SANS }}>{label}</text>
        </svg>
      );
    }
    function PencilIcon() {
      return (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      );
    }
    function Spinner() {
      return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "60px 20px" }}>
          <div style={{ width: "28px", height: "28px", border: `2px solid ${C.border}`,
            borderTop: `2px solid ${C.green}`, borderRadius: "50%",
            animation: "spin 0.8s linear infinite" }} />
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      );
    }

    // ─── Login / Register screen ────────────────────────────────────────────────
    function AuthScreen({ onAuth }) {
      const [mode, setMode]         = useState("login"); // login | register
      const [username, setUsername] = useState("");
      const [pin, setPin]           = useState("");
      const [pinConfirm, setPinConfirm] = useState("");
      const [loading, setLoading]   = useState(false);
      const [error, setError]       = useState("");

      async function handleSubmit() {
        setError("");
        if (!username.trim()) return setError("Please enter a username.");
        if (!pin.trim())      return setError("Please enter a PIN.");
        if (pin.length < 4)   return setError("PIN must be at least 4 characters.");

        if (mode === "register") {
          if (pin !== pinConfirm) return setError("PINs don't match.");
          setLoading(true);
          try {
            const res = await api({ action: "register", username: username.trim(), pin: pin.trim() });
            if (!res.ok) return setError(res.error || "Registration failed.");
            setSession({ key: res.key, username: username.trim() });
            onAuth(res.key, username.trim());
          } catch { setError("Network error. Check your connection."); }
          finally { setLoading(false); }
        } else {
          setLoading(true);
          try {
            const res = await api({ action: "login", username: username.trim(), pin: pin.trim() });
            if (!res.ok) return setError(res.error || "Login failed.");
            setSession({ key: res.key, username: username.trim() });
            onAuth(res.key, username.trim());
          } catch { setError("Network error. Check your connection."); }
          finally { setLoading(false); }
        }
      }

      const inp = { width: "100%", border: `1px solid ${C.border}`, borderRadius: "3px",
        padding: "12px 14px", fontSize: "16px", fontFamily: SANS, color: C.textDark,
        outline: "none", background: C.white, boxSizing: "border-box" };
      const lbl = { fontSize: "10px", fontWeight: 500, color: C.textLight,
        letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: "6px", display: "block" };

      return (
        <div style={{ minHeight: "100vh", background: C.cream, display: "flex",
          flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ width: "100%", maxWidth: "380px" }}>

            {/* Logo */}
            <div style={{ textAlign: "center", marginBottom: "36px" }}>
              <div style={{ fontFamily: SERIF, fontSize: "36px", fontWeight: 600,
                color: C.brown, letterSpacing: "0.01em" }}>Fern Tracker</div>
              <div style={{ fontSize: "11px", color: C.textLight, letterSpacing: "0.12em",
                textTransform: "uppercase", marginTop: "4px" }}>Bumps, birthdays & ages</div>
              <div style={{ width: "40px", height: "1px", background: C.brownMid, margin: "14px auto 0" }} />
            </div>

            {/* Mode toggle */}
            <div style={{ display: "flex", gap: "1px", background: C.border, borderRadius: "3px",
              overflow: "hidden", marginBottom: "24px" }}>
              {[["login","Sign In"],["register","Create Account"]].map(([val, lbl2]) => (
                <button key={val} onClick={() => { setMode(val); setError(""); }} style={{
                  flex: 1, padding: "10px", border: "none", fontFamily: SANS, fontSize: "12px",
                  fontWeight: 500, cursor: "pointer", letterSpacing: "0.08em", textTransform: "uppercase",
                  background: mode === val ? C.brown : C.brownLight,
                  color: mode === val ? C.white : C.textMid }}>{lbl2}</button>
              ))}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: "14px" }}>
              <div>
                <label style={lbl}>Username</label>
                <input style={inp} value={username} onChange={e => setUsername(e.target.value)}
                  placeholder="e.g. kelsey" autoCapitalize="none" autoCorrect="off" />
              </div>
              <div>
                <label style={lbl}>PIN</label>
                <input style={inp} type="password" value={pin} onChange={e => setPin(e.target.value)}
                  placeholder="At least 4 characters" />
              </div>
              {mode === "register" && (
                <div>
                  <label style={lbl}>Confirm PIN</label>
                  <input style={inp} type="password" value={pinConfirm} onChange={e => setPinConfirm(e.target.value)}
                    placeholder="Repeat your PIN" />
                </div>
              )}

              {error && (
                <div style={{ background: "#FBF0F0", border: `1px solid ${C.error}`, borderRadius: "3px",
                  padding: "10px 12px", fontSize: "13px", color: C.error }}>
                  {error}
                </div>
              )}

              <button onClick={handleSubmit} disabled={loading} style={{
                ...Btn(C.green, C.white), padding: "14px", fontSize: "13px",
                opacity: loading ? 0.7 : 1, marginTop: "4px" }}>
                {loading ? "Please wait…" : mode === "login" ? "Sign In" : "Create Account"}
              </button>

              {mode === "login" && (
                <p style={{ textAlign: "center", fontSize: "12px", color: C.textLight, marginTop: "4px" }}>
                  New here?{" "}
                  <button onClick={() => { setMode("register"); setError(""); }}
                    style={{ background: "none", border: "none", color: C.green, cursor: "pointer",
                      fontSize: "12px", fontFamily: SANS, textDecoration: "underline" }}>
                    Create an account
                  </button>
                </p>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── Swipe card ────────────────────────────────────────────────────────────
    function SwipeCard({ onDelete, children }) {
      const [offset, setOffset] = useState(0);
      const [swiped, setSwiped] = useState(false);
      const startXRef = useRef(null);
      const DELETE_W = 80;

      function onTouchStart(e) { startXRef.current = e.touches[0].clientX; }
      function onTouchMove(e) {
        if (startXRef.current == null) return;
        const dx = e.touches[0].clientX - startXRef.current;
        if (swiped) setOffset(Math.min(0, -DELETE_W + dx));
        else if (dx < 0) setOffset(Math.max(dx, -DELETE_W - 10));
      }
      function onTouchEnd(e) {
        const dx = startXRef.current != null ? e.changedTouches[0].clientX - startXRef.current : 0;
        if (swiped) {
          if (dx > DELETE_W / 2) { setOffset(0); setSwiped(false); }
          else setOffset(-DELETE_W);
        } else {
          if (offset < -DELETE_W / 2) { setOffset(-DELETE_W); setSwiped(true); }
          else setOffset(0);
        }
        startXRef.current = null;
      }
      function close() { setOffset(0); setSwiped(false); }

      return (
        <div style={{ position: "relative", borderRadius: "4px", overflow: "hidden" }}>
          <div style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: DELETE_W,
            background: C.error, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <button onClick={() => { close(); onDelete(); }} style={{
              background: "none", border: "none", color: C.white, cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: "3px", fontFamily: SANS }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/>
              </svg>
              <span style={{ fontSize: "9px", fontWeight: 500, letterSpacing: "0.08em", textTransform: "uppercase" }}>Remove</span>
            </button>
          </div>
          <div style={{ transform: `translateX(${offset}px)`,
            transition: (offset === 0 || offset === -DELETE_W) ? "transform 0.22s ease" : "none",
            position: "relative", zIndex: 1 }}
            onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
            onClick={swiped ? close : undefined}>
            {children}
          </div>
        </div>
      );
    }

    // ─── Cards ─────────────────────────────────────────────────────────────────
    function ParentNames({ entry }) {
      const name = entry.friendName2 ? `${entry.friendName} & ${entry.friendName2}` : entry.friendName;
      return <div style={{ fontFamily: SERIF, fontSize: "18px", fontWeight: 600, color: C.textDark, lineHeight: 1.2 }}>{name}</div>;
    }

    function PregnancyCard({ entry, onEdit, onDelete }) {
      const t = getTrimester(entry.weeks);
      const gStyle = GENDER_STYLES[entry.gender] || GENDER_STYLES["Unknown"];
      const accent = TRIMESTER_ACCENTS[t - 1];
      return (
        <SwipeCard onDelete={onDelete}>
          <div style={{ background: C.white, border: `1px solid ${C.border}`, borderRadius: "4px",
            padding: "14px 14px 12px", display: "flex", flexDirection: "column", gap: "10px",
            boxShadow: "0 1px 6px rgba(74,55,40,0.06)", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, left: 0, bottom: 0, width: "3px", background: accent }} />
            <div style={{ display: "flex", alignItems: "center", gap: "12px", paddingLeft: "6px" }}>
              <MiniRing pct={entry.weeks / 40} color={accent} label={`${entry.weeks}w`} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <ParentNames entry={entry} />
                {entry.kidName && <div style={{ fontSize: "12px", color: accent, fontWeight: 500, marginTop: "1px", fontStyle: "italic" }}>{entry.kidName}</div>}
                <div style={{ fontSize: "11px", color: C.textLight, marginTop: "2px", letterSpacing: "0.03em" }}>Due {fmtDate(entry.dueDate)}</div>
              </div>
              <button onClick={() => onEdit(entry)} style={{ background: C.brownLight, border: "none", borderRadius: "3px",
                width: "30px", height: "30px", display: "flex", alignItems: "center", justifyContent: "center",
                cursor: "pointer", color: C.textMid, flexShrink: 0 }}><PencilIcon /></button>
            </div>
            <div style={{ display: "flex", gap: "5px", flexWrap: "wrap", paddingLeft: "6px" }}>
              <Chip label={`Trimester ${t}`} bg={TRIMESTER_COLORS[t-1]} color={accent} />
              <Chip label={`${gStyle.emoji} ${entry.gender}`} bg={gStyle.bg} color={gStyle.accent} />
              <Chip label={`${40 - entry.weeks}w to go`} bg={C.brownLight} color={C.textMid} />
              <button onClick={() => onEdit({ ...entry, _convertToBorn: true })}
                style={{ background: "none", color: C.green, border: `1px solid ${C.green}`, borderRadius: "3px",
                  padding: "3px 9px", fontSize: "11px", fontWeight: 500, cursor: "pointer",
                  fontFamily: SANS, marginLeft: "auto", letterSpacing: "0.04em" }}>arrived ✓</button>
            </div>
            {entry.notes && <div style={{ fontSize: "12px", color: C.textLight, fontStyle: "italic",
              borderTop: `1px solid ${C.border}`, paddingTop: "8px", paddingLeft: "6px", fontFamily: SERIF }}>{entry.notes}</div>}
          </div>
        </SwipeCard>
      );
    }

    function KidCard({ entry, onEdit, onDelete }) {
      const age = getAge(entry.birthDate);
      const stage = getAgeStage(age.totalMonths);
      const gStyle = GENDER_STYLES[entry.gender] || GENDER_STYLES["Unknown"];
      return (
        <SwipeCard onDelete={onDelete}>
          <div style={{ background: C.white, border: `1px solid ${C.border}`, borderRadius: "4px",
            padding: "14px 14px 12px", display: "flex", flexDirection: "column", gap: "10px",
            boxShadow: "0 1px 6px rgba(74,55,40,0.06)", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, left: 0, bottom: 0, width: "3px", background: stage.color }} />
            <div style={{ display: "flex", alignItems: "center", gap: "12px", paddingLeft: "6px" }}>
              <MiniRing pct={age.totalMonths / 144} color={stage.color}
                label={age.totalMonths < 24 ? `${age.totalMonths}m` : `${Math.floor(age.totalMonths/12)}y`} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <ParentNames entry={entry} />
                {entry.kidName && <div style={{ fontSize: "12px", color: stage.color, fontWeight: 500, marginTop: "1px", fontStyle: "italic" }}>{gStyle.emoji} {entry.kidName}</div>}
                <div style={{ fontSize: "11px", color: C.textLight, marginTop: "2px", letterSpacing: "0.03em" }}>Born {fmtDate(entry.birthDate)}</div>
              </div>
              <button onClick={() => onEdit(entry)} style={{ background: C.brownLight, border: "none", borderRadius: "3px",
                width: "30px", height: "30px", display: "flex", alignItems: "center", justifyContent: "center",
                cursor: "pointer", color: C.textMid, flexShrink: 0 }}><PencilIcon /></button>
            </div>
            <div style={{ display: "flex", gap: "5px", flexWrap: "wrap", paddingLeft: "6px" }}>
              <Chip label={formatAge(age)} bg={stage.bg} color={stage.color} />
              <Chip label={stage.label} bg={stage.bg} color={stage.color} />
              <Chip label={`${gStyle.emoji} ${entry.gender}`} bg={gStyle.bg} color={gStyle.accent} />
            </div>
            {entry.notes && <div style={{ fontSize: "12px", color: C.textLight, fontStyle: "italic",
              borderTop: `1px solid ${C.border}`, paddingTop: "8px", paddingLeft: "6px", fontFamily: SERIF }}>{entry.notes}</div>}
          </div>
        </SwipeCard>
      );
    }

    // ─── Entry modal ───────────────────────────────────────────────────────────
    function Modal({ entry, defaultType, onSave, onClose }) {
      const isConvert = entry?._convertToBorn;
      const initType = isConvert ? "born" : entry ? entry.type : (defaultType || "pregnancy");
      const [type, setType] = useState(initType);
      const [form, setForm] = useState(() => {
        if (isConvert) return { friendName: entry.friendName, friendName2: entry.friendName2 || "",
          kidName: entry.kidName || "", gender: entry.gender === "Surprise" ? "Unknown" : entry.gender,
          birthDate: entry.dueDate, notes: entry.notes || "", inputMode: "birthDate" };
        if (entry) return { friendName: entry.friendName || "", friendName2: entry.friendName2 || "",
          kidName: entry.kidName || "", gender: entry.gender || "Unknown", dueDate: entry.dueDate || "",
          weeksInput: entry.weeks ? String(entry.weeks) : "", birthDate: entry.birthDate || "",
          notes: entry.notes || "", inputMode: entry.inputMode || "dueDate" };
        return { friendName: "", friendName2: "", kidName: "", gender: "Unknown",
          dueDate: "", weeksInput: "", birthDate: "", notes: "", inputMode: "dueDate" };
      });

      function set(k, v) { setForm(f => ({ ...f, [k]: v })); }

      function handleSave() {
        if (!form.friendName.trim()) return alert("Please enter a name.");
        if (type === "pregnancy") {
          let weeks, dueDate;
          if (form.inputMode === "dueDate") {
            if (!form.dueDate) return alert("Please enter a due date.");
            weeks = getWeeksFromDueDate(form.dueDate); dueDate = form.dueDate;
          } else {
            const w = parseInt(form.weeksInput);
            if (isNaN(w) || w < 1 || w > 42) return alert("Enter weeks between 1–42.");
            weeks = w; dueDate = getDueDateFromWeeks(w);
          }
          onSave({ type: "pregnancy", id: isConvert ? Date.now() : (entry?.id || Date.now()),
            friendName: form.friendName.trim(), friendName2: form.friendName2.trim(),
            kidName: form.kidName.trim(), gender: form.gender, weeks, dueDate,
            notes: form.notes.trim(), inputMode: form.inputMode,
            _replaceId: isConvert ? entry.id : null });
        } else {
          if (!form.birthDate) return alert("Please enter a birth date.");
          if (getAge(form.birthDate).days < 0) return alert("Birth date can't be in the future.");
          onSave({ type: "born", id: isConvert ? Date.now() : (entry?.id || Date.now()),
            friendName: form.friendName.trim(), friendName2: form.friendName2.trim(),
            kidName: form.kidName.trim(), gender: form.gender, birthDate: form.birthDate,
            notes: form.notes.trim(), _replaceId: isConvert ? entry.id : null });
        }
      }

      const inp = { width: "100%", border: `1px solid ${C.border}`, borderRadius: "3px",
        padding: "10px 12px", fontSize: "15px", fontFamily: SANS, color: C.textDark,
        outline: "none", boxSizing: "border-box", background: C.cream };
      const lbl = { fontSize: "10px", fontWeight: 500, color: C.textLight,
        letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: "6px", display: "block" };

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(44,34,25,0.5)",
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 100, padding: "16px", overflowY: "auto" }}
          onClick={e => e.target === e.currentTarget && onClose()}>
          <div style={{ background: C.white, borderRadius: "4px", padding: "28px",
            width: "100%", maxWidth: "420px", display: "flex", flexDirection: "column", gap: "16px",
            boxShadow: "0 12px 48px rgba(44,34,25,0.18)", margin: "auto" }}>
            <div style={{ fontFamily: SERIF, fontSize: "24px", fontWeight: 600, color: C.textDark,
              borderBottom: `1px solid ${C.border}`, paddingBottom: "12px" }}>
              {isConvert ? "Baby Arrived" : entry?.id ? "Edit Entry" : "New Entry"}
            </div>
            {!entry?.id && !isConvert && (
              <div style={{ display: "flex", gap: "1px", background: C.border, borderRadius: "3px", overflow: "hidden" }}>
                {[["pregnancy","Pregnancy"],["born","Kid"]].map(([val, l]) => (
                  <button key={val} onClick={() => setType(val)} style={{
                    flex: 1, padding: "9px", border: "none", fontFamily: SANS, fontSize: "12px",
                    fontWeight: 500, cursor: "pointer", letterSpacing: "0.08em", textTransform: "uppercase",
                    background: type === val ? C.green : C.brownLight,
                    color: type === val ? C.white : C.textMid }}>{l}</button>
                ))}
              </div>
            )}
            <div><label style={lbl}>Parent 1</label>
              <input style={inp} value={form.friendName} onChange={e => set("friendName", e.target.value)} placeholder="e.g. Sarah" /></div>
            <div><label style={lbl}>Parent 2 <span style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>(optional)</span></label>
              <input style={inp} value={form.friendName2} onChange={e => set("friendName2", e.target.value)} placeholder="e.g. James" /></div>
            <div><label style={lbl}>{type === "pregnancy" ? "Nickname" : "Child's name"} <span style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>(optional)</span></label>
              <input style={inp} value={form.kidName} onChange={e => set("kidName", e.target.value)}
                placeholder={type === "pregnancy" ? "e.g. Baby Bean" : "e.g. Oliver"} /></div>
            {type === "pregnancy" && !isConvert ? (
              <div>
                <label style={lbl}>How far along?</label>
                <div style={{ display: "flex", gap: "1px", background: C.border, borderRadius: "3px", overflow: "hidden", marginBottom: "10px" }}>
                  {["dueDate","weeks"].map(mode => (
                    <button key={mode} onClick={() => set("inputMode", mode)} style={{
                      flex: 1, padding: "8px", border: "none", fontFamily: SANS, fontSize: "12px",
                      fontWeight: 500, cursor: "pointer", letterSpacing: "0.06em", textTransform: "uppercase",
                      background: form.inputMode === mode ? C.brown : C.brownLight,
                      color: form.inputMode === mode ? C.white : C.textMid }}>
                      {mode === "dueDate" ? "Due Date" : "Weeks Along"}
                    </button>
                  ))}
                </div>
                {form.inputMode === "dueDate"
                  ? <input type="date" style={inp} value={form.dueDate} onChange={e => set("dueDate", e.target.value)} />
                  : <input type="number" style={inp} value={form.weeksInput} onChange={e => set("weeksInput", e.target.value)} placeholder="e.g. 24" min="1" max="42" />}
              </div>
            ) : (
              <div><label style={lbl}>Birth Date</label>
                <input type="date" style={inp} value={form.birthDate} onChange={e => set("birthDate", e.target.value)}
                  max={new Date().toISOString().split("T")[0]} /></div>
            )}
            <div>
              <label style={lbl}>Gender</label>
              <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                {GENDER_OPTIONS.map(g => {
                  const s = GENDER_STYLES[g]; const sel = form.gender === g;
                  return (
                    <button key={g} onClick={() => set("gender", g)} style={{
                      padding: "6px 12px", borderRadius: "3px", cursor: "pointer", fontFamily: SANS,
                      fontSize: "12px", fontWeight: 500, letterSpacing: "0.04em",
                      border: sel ? `1.5px solid ${s.accent}` : `1px solid ${C.border}`,
                      background: sel ? s.bg : C.white, color: sel ? s.accent : C.textMid }}>
                      {s.emoji} {g}
                    </button>
                  );
                })}
              </div>
            </div>
            <div><label style={lbl}>Notes <span style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>(optional)</span></label>
              <textarea style={{ ...inp, resize: "vertical", minHeight: "60px" }}
                value={form.notes} onChange={e => set("notes", e.target.value)}
                placeholder="Registry link, hospital, anything to remember…" /></div>
            <div style={{ display: "flex", gap: "8px", marginTop: "4px" }}>
              <button onClick={onClose} style={{ ...Btn(C.brownLight, C.textMid), flex: 1, padding: "12px" }}>Cancel</button>
              <button onClick={handleSave} style={{ ...Btn(C.green, C.white), flex: 2, padding: "12px" }}>
                {isConvert ? "Save" : entry?.id ? "Save Changes" : "Add Entry"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Main app (authenticated) ──────────────────────────────────────────────
    function Tracker({ userKey, username, onSignOut }) {
      const [entries, setEntries]         = useState([]);
      const [loading, setLoading]         = useState(true);
      const [saving, setSaving]           = useState(false);
      const [tab, setTab]                 = useState("all");
      const [sort, setSort]               = useState("name");
      const [search, setSearch]           = useState("");
      const [showModal, setShowModal]     = useState(false);
      const [editing, setEditing]         = useState(null);
      const [defaultType, setDefaultType] = useState("pregnancy");

      // Load from Google Sheets on mount
      useEffect(() => {
        api({ action: "getEntries", key: userKey })
          .then(res => { if (res.ok) setEntries(res.entries || []); })
          .catch(() => {})
          .finally(() => setLoading(false));
      }, [userKey]);

      // Persist to Google Sheets + localStorage backup
      async function persist(list) {
        setEntries(list);
        try { localStorage.setItem("ferntracker-backup-" + userKey, JSON.stringify(list)); } catch {}
        setSaving(true);
        try { await api({ action: "saveEntries", key: userKey, entries: JSON.stringify(list) }); }
        catch {}
        finally { setSaving(false); }
      }

      function handleSave(entry) {
        let updated;
        if (entry._replaceId) {
          updated = entries.filter(e => e.id !== entry._replaceId).concat({ ...entry, _replaceId: undefined });
        } else if (editing?.id && !editing._convertToBorn) {
          updated = entries.map(e => e.id === entry.id ? entry : e);
        } else {
          updated = [...entries, entry];
        }
        persist(updated); setShowModal(false); setEditing(null);
      }

      function handleDelete(id) { persist(entries.filter(e => e.id !== id)); }
      function handleEdit(entry) { setEditing(entry); setShowModal(true); }
      function openAdd(type) { setEditing(null); setDefaultType(type); setShowModal(true); }

      const filtered = entries.filter(e => {
        const tabMatch = tab === "pregnant" ? e.type === "pregnancy" : tab === "born" ? e.type === "born" : true;
        if (!tabMatch) return false;
        if (!search.trim()) return true;
        const q = search.trim().toLowerCase();
        return (e.friendName || "").toLowerCase().includes(q) ||
               (e.friendName2 || "").toLowerCase().includes(q) ||
               (e.kidName || "").toLowerCase().includes(q);
      });
      const sorted = [...filtered].sort((a, b) => {
        if (sort === "name") return a.friendName.localeCompare(b.friendName);
        if (sort === "age") {
          const ageA = a.type === "born" ? getAge(a.birthDate).days : a.weeks * 7;
          const ageB = b.type === "born" ? getAge(b.birthDate).days : b.weeks * 7;
          return ageB - ageA;
        }
        return 0;
      });

      const pregnant = entries.filter(e => e.type === "pregnancy");
      const born     = entries.filter(e => e.type === "born");

      const tabBtn = (val, label, count) => (
        <button onClick={() => setTab(val)} style={{
          padding: "6px 14px", border: tab === val ? `1px solid ${C.green}` : `1px solid ${C.border}`,
          borderRadius: "3px", fontFamily: SANS, fontSize: "12px", fontWeight: 500,
          letterSpacing: "0.06em", textTransform: "uppercase", cursor: "pointer",
          background: tab === val ? C.green : C.white, color: tab === val ? C.white : C.textMid,
          display: "flex", alignItems: "center", gap: "5px" }}>
          {label}
          {count > 0 && (
            <span style={{ background: tab === val ? "rgba(255,255,255,0.25)" : C.brownLight,
              color: tab === val ? C.white : C.textMid,
              borderRadius: "2px", padding: "1px 5px", fontSize: "10px", fontWeight: 600 }}>{count}</span>
          )}
        </button>
      );

      return (
        <div style={{ minHeight: "100vh", background: C.cream, fontFamily: SANS, paddingBottom: "88px" }}>

          {/* Header */}
          <div style={{ background: C.white, borderBottom: `1px solid ${C.border}`,
            padding: "20px 20px 16px", position: "sticky", top: 0, zIndex: 10 }}>
            <div style={{ maxWidth: "560px", margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
                <div>
                  <div style={{ fontFamily: SERIF, fontSize: "28px", fontWeight: 600, color: C.brown }}>Fern Tracker</div>
                  <div style={{ fontSize: "12px", color: C.textLight, letterSpacing: "0.08em", textTransform: "uppercase", marginTop: "1px" }}>
                    Bumps, birthdays & ages
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                  {saving && <span style={{ fontSize: "11px", color: C.textLight, letterSpacing: "0.04em" }}>Saving…</span>}
                  <button onClick={onSignOut} style={{ background: "none", border: `1px solid ${C.border}`,
                    borderRadius: "3px", padding: "5px 10px", fontSize: "11px", color: C.textLight,
                    cursor: "pointer", fontFamily: SANS, letterSpacing: "0.06em", textTransform: "uppercase" }}>
                    Sign out
                  </button>
                </div>
              </div>
              <div style={{ marginTop: "12px", position: "relative" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={C.textLight}
                  strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                  style={{ position: "absolute", left: "11px", top: "50%", transform: "translateY(-50%)", pointerEvents: "none" }}>
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="Search by parent or child name…"
                  style={{ width: "100%", border: `1px solid ${C.border}`, borderRadius: "3px",
                    padding: "9px 32px 9px 34px", fontSize: "13px", fontFamily: SANS,
                    color: C.textDark, outline: "none", background: C.cream, boxSizing: "border-box" }} />
                {search && (
                  <button onClick={() => setSearch("")} style={{ position: "absolute", right: "10px",
                    top: "50%", transform: "translateY(-50%)", background: "none", border: "none",
                    cursor: "pointer", color: C.textLight, fontSize: "15px", lineHeight: 1 }}>✕</button>
                )}
              </div>
            </div>
          </div>

          <div style={{ maxWidth: "560px", margin: "0 auto", padding: "16px 16px 0" }}>
            {loading ? <Spinner /> : (
              <>
                {entries.length > 0 && (
                  <div style={{ display: "flex", gap: "6px", marginBottom: "14px", alignItems: "center", flexWrap: "wrap" }}>
                    {tabBtn("all", "All", entries.length)}
                    {tabBtn("pregnant", "Pregnant", pregnant.length)}
                    {tabBtn("born", "Kids", born.length)}
                    <div style={{ marginLeft: "auto", display: "flex", gap: "5px" }}>
                      {[["name","A–Z"],["age","Age"]].map(([val, l]) => (
                        <button key={val} onClick={() => setSort(val)} style={{
                          padding: "5px 10px", border: sort === val ? `1px solid ${C.brown}` : `1px solid ${C.border}`,
                          borderRadius: "3px", cursor: "pointer", fontFamily: SANS, fontSize: "11px",
                          fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase",
                          background: sort === val ? C.brown : C.white,
                          color: sort === val ? C.white : C.textMid }}>{l}</button>
                      ))}
                    </div>
                  </div>
                )}

                {entries.length > 0 && <div style={{ height: "1px", background: C.border, marginBottom: "14px" }} />}

                {entries.length === 0 && (
                  <div style={{ textAlign: "center", padding: "80px 20px" }}>
                    <div style={{ fontFamily: SERIF, fontSize: "13px", color: C.textLight,
                      letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: "10px" }}>Nothing here yet</div>
                    <div style={{ fontFamily: SERIF, fontSize: "28px", fontStyle: "italic", color: C.brownMid, marginBottom: "6px" }}>
                      Add your first entry
                    </div>
                    <div style={{ width: "40px", height: "1px", background: C.brownMid, margin: "0 auto" }} />
                  </div>
                )}

                <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                  {sorted.map(e => e.type === "pregnancy"
                    ? <PregnancyCard key={e.id} entry={e} onEdit={handleEdit} onDelete={() => handleDelete(e.id)} />
                    : <KidCard       key={e.id} entry={e} onEdit={handleEdit} onDelete={() => handleDelete(e.id)} />
                  )}
                </div>
              </>
            )}
          </div>

          {/* Bottom bar */}
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 20,
            background: "rgba(250,247,242,0.97)", backdropFilter: "blur(10px)",
            borderTop: `1px solid ${C.border}`, padding: "12px 20px",
            display: "flex", gap: "10px", justifyContent: "center" }}>
            <button onClick={() => openAdd("pregnancy")} style={{
              ...Btn(C.white, C.brown), flex: 1, maxWidth: "220px", padding: "13px 16px",
              fontSize: "12px", border: `1px solid ${C.brown}` }}>Add Pregnancy</button>
            <button onClick={() => openAdd("born")} style={{
              ...Btn(C.green, C.white), flex: 1, maxWidth: "220px", padding: "13px 16px",
              fontSize: "12px" }}>Add Kid</button>
          </div>

          {showModal && (
            <Modal entry={editing} defaultType={defaultType} onSave={handleSave}
              onClose={() => { setShowModal(false); setEditing(null); }} />
          )}
        </div>
      );
    }

    // ─── Root ──────────────────────────────────────────────────────────────────
    function App() {
      const [auth, setAuth] = useState(() => getSession());

      function handleAuth(key, username) { setAuth({ key, username }); }
      function handleSignOut() { clearSession(); setAuth(null); }

      if (!auth) return <AuthScreen onAuth={handleAuth} />;
      return <Tracker userKey={auth.key} username={auth.username} onSignOut={handleSignOut} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
